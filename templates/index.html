<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Movie Recommendation Agent</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="overlay">

    <div class="container">

        <div class="card">

            <h1>
                <i class="fas fa-film"></i>
                AI Movie Recommendation Agent
            </h1>

            <p class="subtitle">
                Discover the Best Movies Instantly
            </p>

            <form action="/recommend" method="POST">

                <label>Select Movie Genre</label>

                <select name="genre" required>

                    <option value="">Choose Genre</option>

                    {% for genre in genres %}

                    <option value="{{ genre }}">
                        {{ genre }}
                    </option>

                    {% endfor %}

                </select>

                <button type="submit">
                    <i class="fas fa-clapperboard"></i>
                    Recommend Movies
                </button>

            </form>

            <div class="features">

                <div class="box">
                    🎬
                    <h3>50+ Movies</h3>
                </div>

                <div class="box">
                    ⭐
                    <h3>Top Rated</h3>
                </div>

                <div class="box">
                    🤖
                    <h3>AI Powered</h3>
                </div>

            </div>
            <footer>

                Made with ❤️ by
                <b>Vaishnavi Reddy</b>

            </footer>

        </div>

    </div>

</div>

</body>
</html>
